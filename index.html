<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Payment Tracking</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f0f2f5;
            color: #333;
            min-height: 100vh;
        }

        .container {
            max-width: 900px;
            margin: 0 auto;
            padding: 20px;
        }

        header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 30px;
            border-radius: 16px;
            margin-bottom: 24px;
            box-shadow: 0 4px 20px rgba(102, 126, 234, 0.3);
        }

        header h1 {
            font-size: 28px;
            margin-bottom: 8px;
        }

        header p {
            opacity: 0.9;
            font-size: 14px;
        }

        .summary-cards {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }

        .card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .card .label {
            font-size: 13px;
            color: #888;
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .card .value {
            font-size: 26px;
            font-weight: 700;
        }

        .card.total .value { color: #667eea; }
        .card.paid .value { color: #22c55e; }
        .card.pending .value { color: #f59e0b; }
        .card.overdue .value { color: #ef4444; }

        .section {
            background: white;
            border-radius: 12px;
            padding: 24px;
            margin-bottom: 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.06);
        }

        .section-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }

        .section-header h2 {
            font-size: 18px;
            color: #333;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: all 0.2s;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-success {
            background: #22c55e;
            color: white;
        }

        .btn-success:hover {
            background: #16a34a;
        }

        .btn-danger {
            background: #ef4444;
            color: white;
        }

        .btn-danger:hover {
            background: #dc2626;
        }

        .btn-sm {
            padding: 6px 12px;
            font-size: 12px;
        }

        /* Form */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-size: 13px;
            font-weight: 600;
            color: #555;
            margin-bottom: 6px;
        }

        .form-group input,
        .form-group select,
        .form-group textarea {
            padding: 10px 14px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 14px;
            transition: border-color 0.2s;
            outline: none;
        }

        .form-group input:focus,
        .form-group select:focus,
        .form-group textarea:focus {
            border-color: #667eea;
        }

        .form-actions {
            grid-column: 1 / -1;
            display: flex;
            gap: 10px;
            justify-content: flex-end;
            margin-top: 8px;
        }

        /* Table */
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: collapse;
        }

        th, td {
            padding: 12px 16px;
            text-align: left;
            border-bottom: 1px solid #f0f0f0;
        }

        th {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            color: #888;
            font-weight: 600;
        }

        td {
            font-size: 14px;
        }

        tr:hover {
            background: #f9fafb;
        }

        .status-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
        }

        .status-paid {
            background: #dcfce7;
            color: #166534;
        }

        .status-pending {
            background: #fef3c7;
            color: #92400e;
        }

        .status-overdue {
            background: #fee2e2;
            color: #991b1b;
        }

        .amount {
            font-weight: 600;
            font-variant-numeric: tabular-nums;
        }

        .actions {
            display: flex;
            gap: 6px;
        }

        /* Filter bar */
        .filter-bar {
            display: flex;
            gap: 12px;
            margin-bottom: 16px;
            flex-wrap: wrap;
        }

        .filter-bar select,
        .filter-bar input {
            padding: 8px 12px;
            border: 2px solid #e5e7eb;
            border-radius: 8px;
            font-size: 13px;
            outline: none;
            flex: 1 1 140px;
            min-width: 0;
        }

        .filter-bar input {
            flex: 1 1 100%;
        }

        .filter-bar select:focus,
        .filter-bar input:focus {
            border-color: #667eea;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 40px;
            color: #999;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        /* Modal overlay */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: rgba(0,0,0,0.5);
            z-index: 1000;
            justify-content: center;
            align-items: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal {
            background: white;
            border-radius: 16px;
            padding: 30px;
            width: 90%;
            max-width: 500px;
            max-height: 90vh;
            overflow-y: auto;
        }

        .modal h3 {
            font-size: 20px;
            margin-bottom: 20px;
        }

        /* Responsive */
        @media (max-width: 600px) {
            .form-grid {
                grid-template-columns: 1fr;
            }
            .summary-cards {
                grid-template-columns: 1fr 1fr;
            }

            /* Hide the original table on mobile */
            .table-wrapper {
                display: none;
            }

            /* Mobile card list */
            .mobile-cards {
                display: flex;
                flex-direction: column;
                gap: 12px;
            }

            .mobile-card {
                background: #f9fafb;
                border-radius: 10px;
                padding: 16px;
                border: 1px solid #e5e7eb;
            }

            .mobile-card-header {
                display: flex;
                justify-content: space-between;
                align-items: flex-start;
                margin-bottom: 10px;
            }

            .mobile-card-header .name {
                font-weight: 700;
                font-size: 15px;
                color: #333;
            }

            .mobile-card-header .amount {
                font-weight: 700;
                font-size: 15px;
                color: #667eea;
                white-space: nowrap;
                margin-left: 12px;
            }

            .mobile-card-meta {
                display: flex;
                flex-wrap: wrap;
                gap: 8px;
                margin-bottom: 10px;
                align-items: center;
            }

            .mobile-card-meta .meta-item {
                font-size: 12px;
                color: #666;
                background: #fff;
                padding: 3px 8px;
                border-radius: 6px;
                border: 1px solid #e5e7eb;
            }

            .mobile-card-actions {
                display: flex;
                gap: 6px;
                flex-wrap: wrap;
            }
        }

        @media (min-width: 601px) {
            .mobile-cards {
                display: none;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>💰 Payment Tracking</h1>
            <p>ติดตามการชำระเงินของคุณได้ง่ายและสะดวก</p>
        </header>

        <!-- Summary Cards -->
        <div class="summary-cards">
            <div class="card total">
                <div class="label">ทั้งหมด</div>
                <div class="value" id="totalAmount">฿0.00</div>
            </div>
            <div class="card paid">
                <div class="label">ชำระแล้ว</div>
                <div class="value" id="paidAmount">฿0.00</div>
            </div>
            <div class="card pending">
                <div class="label">รอดำเนินการ</div>
                <div class="value" id="pendingAmount">฿0.00</div>
            </div>
            <div class="card overdue">
                <div class="label">เกินกำหนด</div>
                <div class="value" id="overdueAmount">฿0.00</div>
            </div>
        </div>

        <!-- Add Payment Form -->
        <div class="section">
            <div class="section-header">
                <h2>➕ เพิ่มรายการชำระเงิน</h2>
            </div>
            <form id="paymentForm" class="form-grid">
                <div class="form-group">
                    <label>ชื่อรายการ</label>
                    <input type="text" id="paymentName" placeholder="เช่น ค่าเช่า, ค่าไฟฟ้า" required>
                </div>
                <div class="form-group">
                    <label>จำนวนเงิน (บาท)</label>
                    <input type="number" id="paymentAmount" placeholder="0.00" step="0.01" min="0" required>
                </div>
                <div class="form-group">
                    <label>ประเภท</label>
                    <select id="paymentCategory">
                        <option value="ค่าใช้จ่าย">ค่าใช้จ่าย</option>
                        <option value="ค่าบริการ">ค่าบริการ</option>
                        <option value="ค่าสินค้า">ค่าสินค้า</option>
                        <option value="อื่นๆ">อื่นๆ</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>สถานะ</label>
                    <select id="paymentStatus">
                        <option value="pending">รอดำเนินการ</option>
                        <option value="paid">ชำระแล้ว</option>
                        <option value="overdue">เกินกำหนด</option>
                    </select>
                </div>
                <div class="form-group">
                    <label>วันที่ครบกำหนด</label>
                    <input type="date" id="paymentDueDate" required>
                </div>
                <div class="form-group">
                    <label>วันที่ชำระ</label>
                    <input type="date" id="paymentPaidDate">
                </div>
                <div class="form-group full-width">
                    <label>หมายเหตุ</label>
                    <textarea id="paymentNote" rows="2" placeholder="หมายเหตุเพิ่มเติม..."></textarea>
                </div>
                <div class="form-actions">
                    <button type="button" class="btn btn-danger btn-sm" onclick="clearForm()">ล้าง</button>
                    <button type="submit" class="btn btn-primary">เพิ่มรายการ</button>
                </div>
            </form>
        </div>

        <!-- Payment List -->
        <div class="section">
            <div class="section-header">
                <h2>📋 รายการชำระเงิน</h2>
                <button class="btn btn-primary btn-sm" onclick="openStats()">📊 สถิติ</button>
            </div>

            <div class="filter-bar">
                <select id="filterStatus" onchange="renderPayments()">
                    <option value="all">ทุกสถานะ</option>
                    <option value="pending">รอดำเนินการ</option>
                    <option value="paid">ชำระแล้ว</option>
                    <option value="overdue">เกินกำหนด</option>
                </select>
                <select id="filterCategory" onchange="renderPayments()">
                    <option value="all">ทุกประเภท</option>
                    <option value="ค่าใช้จ่าย">ค่าใช้จ่าย</option>
                    <option value="ค่าบริการ">ค่าบริการ</option>
                    <option value="ค่าสินค้า">ค่าสินค้า</option>
                    <option value="อื่นๆ">อื่นๆ</option>
                </select>
                <select id="sortBy" onchange="renderPayments()">
                    <option value="dueDate-asc">วันครบกำหนด (ใกล้ → ไกล)</option>
                    <option value="dueDate-desc">วันครบกำหนด (ไกล → ใกล้)</option>
                    <option value="amount-desc">จำนวนเงิน (มาก → น้อย)</option>
                    <option value="amount-asc">จำนวนเงิน (น้อย → มาก)</option>
                    <option value="name-asc">ชื่อรายการ (ก → ฮ)</option>
                    <option value="name-desc">ชื่อรายการ (ฮ → ก)</option>
                    <option value="createdAt-desc">เพิ่มล่าสุด</option>
                    <option value="createdAt-asc">เพิ่มแรกสุด</option>
                </select>
                <input type="text" id="searchInput" placeholder="🔍 ค้นหา..." oninput="renderPayments()">
            </div>

            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>รายการ</th>
                            <th>ประเภท</th>
                            <th>จำนวนเงิน</th>
                            <th>ครบกำหนด</th>
                            <th>สถานะ</th>
                            <th>จัดการ</th>
                        </tr>
                    </thead>
                    <tbody id="paymentTableBody">
                    </tbody>
                </table>
            </div>
            <!-- Mobile card list -->
            <div class="mobile-cards" id="mobileCards"></div>

            <div class="empty-state" id="emptyState">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5">
                    <rect x="2" y="5" width="20" height="14" rx="2"/>
                    <line x1="2" y1="10" x2="22" y2="10"/>
                </svg>
                <p>ยังไม่มีรายการชำระเงิน</p>
                <p style="font-size:13px; margin-top:4px;">เพิ่มรายการแรกของคุณได้เลย!</p>
            </div>
        </div>
    </div>

    <!-- Stats Modal -->
    <div class="modal-overlay" id="statsModal">
        <div class="modal">
            <h3>📊 สถิติการชำระเงิน</h3>
            <div id="statsContent"></div>
            <div style="text-align:right; margin-top:20px;">
                <button class="btn btn-primary" onclick="closeStats()">ปิด</button>
            </div>
        </div>
    </div>

    <script>
        // Data
        let payments = JSON.parse(localStorage.getItem('payments') || '[]');
        let editingId = null;

        // Format currency
        function formatCurrency(amount) {
            return '฿' + parseFloat(amount).toLocaleString('th-TH', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        // Format date
        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const d = new Date(dateStr);
            return d.toLocaleDateString('th-TH', { day: '2-digit', month: 'short', year: 'numeric' });
        }

        // Status label
        function statusLabel(status) {
            const map = { paid: 'ชำระแล้ว', pending: 'รอดำเนินการ', overdue: 'เกินกำหนด' };
            return map[status] || status;
        }

        // Save to localStorage
        function saveData() {
            localStorage.setItem('payments', JSON.stringify(payments));
        }

        // Update summary
        function updateSummary() {
            const total = payments.reduce((s, p) => s + parseFloat(p.amount), 0);
            const paid = payments.filter(p => p.status === 'paid').reduce((s, p) => s + parseFloat(p.amount), 0);
            const pending = payments.filter(p => p.status === 'pending').reduce((s, p) => s + parseFloat(p.amount), 0);
            const overdue = payments.filter(p => p.status === 'overdue').reduce((s, p) => s + parseFloat(p.amount), 0);

            document.getElementById('totalAmount').textContent = formatCurrency(total);
            document.getElementById('paidAmount').textContent = formatCurrency(paid);
            document.getElementById('pendingAmount').textContent = formatCurrency(pending);
            document.getElementById('overdueAmount').textContent = formatCurrency(overdue);
        }

        // Auto-update overdue payments
        function updateOverdue() {
            const today = new Date().toISOString().split('T')[0];
            let changed = false;
            payments.forEach(p => {
                if (p.status === 'pending' && p.dueDate && p.dueDate < today) {
                    p.status = 'overdue';
                    changed = true;
                }
            });
            if (changed) saveData();
        }

        // Render payments table
        function renderPayments() {
            updateOverdue();

            const statusFilter = document.getElementById('filterStatus').value;
            const categoryFilter = document.getElementById('filterCategory').value;
            const search = document.getElementById('searchInput').value.toLowerCase();

            let filtered = payments.filter(p => {
                if (statusFilter !== 'all' && p.status !== statusFilter) return false;
                if (categoryFilter !== 'all' && p.category !== categoryFilter) return false;
                if (search && !p.name.toLowerCase().includes(search)) return false;
                return true;
            });

            // Sorting
            const sortValue = document.getElementById('sortBy').value;
            const [sortField, sortDir] = sortValue.split('-');
            filtered.sort((a, b) => {
                let valA, valB;
                if (sortField === 'dueDate' || sortField === 'createdAt') {
                    valA = a[sortField] || '';
                    valB = b[sortField] || '';
                } else if (sortField === 'amount') {
                    valA = parseFloat(a.amount);
                    valB = parseFloat(b.amount);
                } else if (sortField === 'name') {
                    valA = a.name || '';
                    valB = b.name || '';
                }
                if (valA < valB) return sortDir === 'asc' ? -1 : 1;
                if (valA > valB) return sortDir === 'asc' ? 1 : -1;
                return 0;
            });

            const tbody = document.getElementById('paymentTableBody');
            const emptyState = document.getElementById('emptyState');

            if (filtered.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }

            emptyState.style.display = 'none';

            tbody.innerHTML = filtered.map(p => `
                <tr>
                    <td>
                        <strong>${p.name}</strong>
                        ${p.note ? `<br><small style="color:#999;">${p.note}</small>` : ''}
                    </td>
                    <td>${p.category}</td>
                    <td class="amount">${formatCurrency(p.amount)}</td>
                    <td>${formatDate(p.dueDate)}</td>
                    <td><span class="status-badge status-${p.status}">${statusLabel(p.status)}</span></td>
                    <td>
                        <div class="actions">
                            ${p.status !== 'paid' ? `<button class="btn btn-success btn-sm" onclick="markPaid('${p.id}')">✓ ชำระ</button>` : ''}
                            <button class="btn btn-primary btn-sm" onclick="editPayment('${p.id}')">แก้ไข</button>
                            <button class="btn btn-danger btn-sm" onclick="deletePayment('${p.id}')">ลบ</button>
                        </div>
                    </td>
                </tr>
            `).join('');

            // Mobile cards
            const mobileCards = document.getElementById('mobileCards');
            mobileCards.innerHTML = filtered.map(p => `
                <div class="mobile-card">
                    <div class="mobile-card-header">
                        <div>
                            <div class="name">${p.name}</div>
                            ${p.note ? `<small style="color:#999;">${p.note}</small>` : ''}
                        </div>
                        <div class="amount">${formatCurrency(p.amount)}</div>
                    </div>
                    <div class="mobile-card-meta">
                        <span class="status-badge status-${p.status}">${statusLabel(p.status)}</span>
                        <span class="meta-item">${p.category}</span>
                        <span class="meta-item">📅 ${formatDate(p.dueDate)}</span>
                        ${p.paidDate ? `<span class="meta-item">✅ ${formatDate(p.paidDate)}</span>` : ''}
                    </div>
                    <div class="mobile-card-actions">
                        ${p.status !== 'paid' ? `<button class="btn btn-success btn-sm" onclick="markPaid('${p.id}')">✓ ชำระ</button>` : ''}
                        <button class="btn btn-primary btn-sm" onclick="editPayment('${p.id}')">แก้ไข</button>
                        <button class="btn btn-danger btn-sm" onclick="deletePayment('${p.id}')">ลบ</button>
                    </div>
                </div>
            `).join('');

            updateSummary();
        }

        // Add / Update payment
        document.getElementById('paymentForm').addEventListener('submit', function(e) {
            e.preventDefault();

            const payment = {
                id: editingId || Date.now().toString(),
                name: document.getElementById('paymentName').value,
                amount: parseFloat(document.getElementById('paymentAmount').value),
                category: document.getElementById('paymentCategory').value,
                status: document.getElementById('paymentStatus').value,
                dueDate: document.getElementById('paymentDueDate').value,
                paidDate: document.getElementById('paymentPaidDate').value || null,
                note: document.getElementById('paymentNote').value,
                createdAt: editingId ? payments.find(p => p.id === editingId)?.createdAt : new Date().toISOString()
            };

            if (editingId) {
                const idx = payments.findIndex(p => p.id === editingId);
                payments[idx] = payment;
                editingId = null;
            } else {
                payments.push(payment);
            }

            saveData();
            renderPayments();
            clearForm();
        });

        // Mark as paid
        function markPaid(id) {
            const p = payments.find(p => p.id === id);
            if (p) {
                p.status = 'paid';
                p.paidDate = new Date().toISOString().split('T')[0];
                saveData();
                renderPayments();
            }
        }

        // Edit payment
        function editPayment(id) {
            const p = payments.find(p => p.id === id);
            if (!p) return;

            editingId = id;
            document.getElementById('paymentName').value = p.name;
            document.getElementById('paymentAmount').value = p.amount;
            document.getElementById('paymentCategory').value = p.category;
            document.getElementById('paymentStatus').value = p.status;
            document.getElementById('paymentDueDate').value = p.dueDate;
            document.getElementById('paymentPaidDate').value = p.paidDate || '';
            document.getElementById('paymentNote').value = p.note || '';

            window.scrollTo({ top: 0, behavior: 'smooth' });
        }

        // Delete payment
        function deletePayment(id) {
            if (confirm('ต้องการลบรายการนี้หรือไม่?')) {
                payments = payments.filter(p => p.id !== id);
                saveData();
                renderPayments();
            }
        }

        // Clear form
        function clearForm() {
            editingId = null;
            document.getElementById('paymentForm').reset();
            document.getElementById('paymentDueDate').value = new Date().toISOString().split('T')[0];
        }

        // Stats modal
        function openStats() {
            const total = payments.length;
            const paid = payments.filter(p => p.status === 'paid').length;
            const pending = payments.filter(p => p.status === 'pending').length;
            const overdue = payments.filter(p => p.status === 'overdue').length;

            const categories = {};
            payments.forEach(p => {
                categories[p.category] = (categories[p.category] || 0) + parseFloat(p.amount);
            });

            const catHtml = Object.entries(categories).map(([cat, amt]) =>
                `<div style="display:flex;justify-content:space-between;padding:8px 0;border-bottom:1px solid #f0f0f0;"><span>${cat}</span><strong>${formatCurrency(amt)}</strong></div>`
            ).join('');

            document.getElementById('statsContent').innerHTML = `
                <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:20px;">
                    <div style="background:#f9fafb;padding:16px;border-radius:8px;text-align:center;">
                        <div style="font-size:24px;font-weight:700;color:#667eea;">${total}</div>
                        <div style="font-size:12px;color:#888;">รายการทั้งหมด</div>
                    </div>
                    <div style="background:#f0fdf4;padding:16px;border-radius:8px;text-align:center;">
                        <div style="font-size:24px;font-weight:700;color:#22c55e;">${paid}</div>
                        <div style="font-size:12px;color:#888;">ชำระแล้ว</div>
                    </div>
                    <div style="background:#fffbeb;padding:16px;border-radius:8px;text-align:center;">
                        <div style="font-size:24px;font-weight:700;color:#f59e0b;">${pending}</div>
                        <div style="font-size:12px;color:#888;">รอดำเนินการ</div>
                    </div>
                    <div style="background:#fef2f2;padding:16px;border-radius:8px;text-align:center;">
                        <div style="font-size:24px;font-weight:700;color:#ef4444;">${overdue}</div>
                        <div style="font-size:12px;color:#888;">เกินกำหนด</div>
                    </div>
                </div>
                <h4 style="margin-bottom:12px;">ยอดรวมตามประเภท</h4>
                ${catHtml || '<p style="color:#999;">ไม่มีข้อมูล</p>'}
            `;

            document.getElementById('statsModal').classList.add('active');
        }

        function closeStats() {
            document.getElementById('statsModal').classList.remove('active');
        }

        // Close modal on overlay click
        document.getElementById('statsModal').addEventListener('click', function(e) {
            if (e.target === this) closeStats();
        });

        // Init
        document.getElementById('paymentDueDate').value = new Date().toISOString().split('T')[0];
        renderPayments();
    </script>
</body>
</html>
